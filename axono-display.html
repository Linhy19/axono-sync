<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXONO LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --card: #ffffff;
    --line: #e0e0e0;
    --line2: #d0d0d0;
    --red: #d10020;
    --red-light: rgba(209,0,32,0.08);
    --red-glow: rgba(209,0,32,0.22);
    --dark: #1a1a1a;
    --text: #1a1a1a;
    --muted: #999999;
    --green: #00b248;
    --warn: #e67e00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 30% at 50% 0%, rgba(209,0,32,0.05) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ── CONNECT SCREEN ── */
  #connectScreen {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; gap: 16px;
  }
  .connect-logo-img {
    width: min(420px, 55vw); height: auto;
  }
  .connect-live-badge {
    font-family: 'Bebas Neue', sans-serif; font-size: 11px;
    letter-spacing: 5px; text-transform: uppercase;
    color: var(--red); margin-top: -8px;
  }
  .connect-sub {
    font-family: 'Inter', sans-serif; font-size: 11px;
    letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
  }
  .connect-box {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 18px; padding: 24px; width: 100%; max-width: 360px;
    display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .connect-label {
    font-family: 'Bebas Neue', sans-serif; font-size: 12px;
    letter-spacing: 3px; color: var(--muted); text-align: center;
  }
  .connect-input {
    background: var(--bg); border: 1.5px solid var(--line);
    border-radius: 10px; color: var(--dark);
    font-family: 'Bebas Neue', sans-serif; font-size: 28px;
    letter-spacing: 6px; text-align: center; text-transform: uppercase;
    padding: 14px; outline: none; width: 100%;
    transition: border-color 0.2s;
  }
  .connect-input:focus { border-color: var(--red); background: #fff; }
  .connect-input::placeholder { color: var(--muted); }
  .connect-btn {
    background: var(--red); border: none; border-radius: 10px;
    color: #fff; font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 3px; padding: 14px;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 20px var(--red-glow);
  }
  .connect-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
  .connect-error {
    font-size: 12px; color: var(--red); text-align: center;
    font-family: 'Inter', sans-serif; display: none;
  }

  /* ── DISPLAY SCREEN ── */
  #displayScreen { display: none; position: relative; z-index: 1; }
  .display-wrap { max-width: 480px; margin: 0 auto; padding: 12px 14px 40px; }

  .d-header {
    display: flex; align-items: center; justify-content: center;
    padding: 16px 0 8px; position: relative;
  }
  .d-header-logo { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .d-logo-img { width: min(300px, 30vw); height: auto; }
  .d-live-badge {
    font-family: 'Bebas Neue', sans-serif; font-size: 9px;
    letter-spacing: 4px; color: var(--red); text-transform: uppercase;
  }
  .d-header-right { 
    position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: flex-end; gap: 3px; 
  }
  .d-code {
    font-family: 'Bebas Neue', sans-serif; font-size: 13px;
    letter-spacing: 3px; color: var(--muted);
  }
  .d-status { display: flex; align-items: center; gap: 6px; }
  .d-sync-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #ccc;
    transition: background 0.3s;
  }
  .d-sync-label { font-size: 11px; color: var(--muted); font-family: 'Inter', sans-serif; letter-spacing: 1px; }

  /* Clock bar */
  .d-clock-bar {
    background: var(--dark); border-radius: 14px; padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    margin: 12px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.12); gap: 8px;
  }
  .d-period {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; letter-spacing: 2px; color: var(--red); white-space: nowrap;
  }
  .d-clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; letter-spacing: 3px; color: #fff;
    min-width: 110px; text-align: center;
    transition: color 0.3s, text-shadow 0.3s;
  }
  .d-clock.running { color: #4cff8f; text-shadow: 0 0 12px rgba(76,255,143,0.4); }
  .d-clock.warning { color: var(--warn); text-shadow: 0 0 12px rgba(230,126,0,0.4); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
  .d-clock-status {
    font-family: 'Bebas Neue', sans-serif; font-size: 13px;
    letter-spacing: 2px; color: rgba(255,255,255,0.35); min-width: 50px; text-align: right;
  }
  .d-clock-status.live { color: #4cff8f; }

  /* Scoreboard */
  .d-scoreboard {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 10px; margin: 10px 0; align-items: stretch;
  }
  .d-team-card {
    background: var(--card); border: 1.5px solid var(--line);
    border-radius: 18px; padding: 18px 12px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    position: relative; overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .d-team-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: var(--line2); transition: background 0.3s;
  }
  .d-team-card.leading { border-color: var(--red); box-shadow: 0 4px 24px var(--red-glow); }
  .d-team-card.leading::before { background: var(--red); }
  .d-team-color { width: 9px; height: 9px; border-radius: 50%; position: absolute; top: 14px; right: 14px; }
  .d-team-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 19px;
    letter-spacing: 2px; color: var(--muted); text-align: center;
  }
  .d-team-card.leading .d-team-name { color: var(--dark); }
  .d-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 86px; line-height: 1; letter-spacing: -1px;
    color: var(--dark); transition: transform 0.15s, color 0.3s;
  }
  .d-team-card.leading .d-score { color: var(--red); }
  .d-score.bump { transform: scale(1.22); }
  .d-pen-badges { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; min-height: 18px; }
  .d-pen-badge {
    background: var(--red-light); border: 1px solid rgba(209,0,32,0.25);
    color: var(--red); font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 5px; font-family: 'Inter', sans-serif;
  }
  .d-vs { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 6px 0; }
  .d-vs-text { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); letter-spacing: 2px; }
  .d-center-line { width: 1px; height: 40px; background: linear-gradient(to bottom, transparent, var(--line2), transparent); }

  /* Sections */
  .d-section {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 16px; padding: 16px; margin: 10px 0;
    box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  }
  .d-section-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 15px;
    letter-spacing: 3px; color: var(--red); margin-bottom: 12px; text-transform: uppercase;
  }
  .d-feed { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
  .d-feed::-webkit-scrollbar { width: 3px; }
  .d-feed::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }
  .d-event {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg); border: 1.5px solid var(--line);
    border-left: 3px solid var(--red);
    border-radius: 10px; padding: 10px 13px;
    animation: fadeSlide 0.4s ease;
  }
  .d-event.team-b { flex-direction: row-reverse; border-left: 1.5px solid var(--line); border-right: 3px solid var(--dark); }
  .d-event.pen-event { border-left-color: var(--warn); background: rgba(230,126,0,0.04); border-color: rgba(230,126,0,0.2); }
  @keyframes fadeSlide { from { opacity:0; transform:translateY(-7px); } to { opacity:1; transform:translateY(0); } }
  .d-event-icon { font-size: 16px; flex-shrink: 0; }
  .d-event-info { flex: 1; min-width: 0; }
  .d-event-name {
    font-family: 'Bebas Neue', sans-serif; font-size: 17px;
    letter-spacing: 0.5px; color: var(--dark);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .d-event-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .d-event-meta { font-size: 11px; color: var(--muted); text-align: right; white-space: nowrap; flex-shrink: 0; line-height: 1.5; }
  .d-event.team-b .d-event-meta { text-align: left; }

  /* Stats */
  .d-stats { display: flex; flex-direction: column; gap: 6px; }
  .d-stat-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-radius: 10px;
    background: var(--bg); border: 1.5px solid var(--line);
    border-left: 3px solid var(--red);
  }
  .d-stat-name { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--dark); }
  .d-stat-team { font-size: 11px; color: var(--muted); margin-left: 8px; }
  .d-stat-nums { display: flex; gap: 16px; }
  .d-stat-num { text-align: center; }
  .d-stat-num .val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--red); }
  .d-stat-num .lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

  /* Penalties active */
  .d-pen-row {
    display: flex; align-items: center; gap: 12px;
    background: rgba(230,126,0,0.04); border: 1.5px solid rgba(230,126,0,0.2);
    border-radius: 10px; padding: 10px 13px;
  }
  .d-pen-timer {
    font-family: 'Bebas Neue', sans-serif; font-size: 22px;
    color: var(--warn); min-width: 50px; text-align: right; flex-shrink: 0;
  }

  /* Toast */
  .d-toast {
    position: fixed; top: 18px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--red); color: #fff;
    font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px;
    padding: 12px 28px; border-radius: 30px;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999; white-space: nowrap; box-shadow: 0 8px 28px var(--red-glow);
  }
  .d-toast.show { transform: translateX(-50%) translateY(0); }
  .d-toast.goal { background: var(--dark); color: #fff; box-shadow: 0 8px 28px rgba(0,0,0,0.2); }

  .empty-msg { text-align: center; color: var(--muted); font-size: 13px; padding: 22px; font-style: italic; }

  @media (max-width: 360px) {
    .d-score { font-size: 68px; }
    .d-clock { font-size: 32px; }
  }

  /* ── TABLET PORTRAIT (600px+) ── */
  @media (min-width: 600px) {
    .display-wrap { max-width: 600px; padding: 16px 24px 40px; }
    .d-score { font-size: 100px; }
    .d-clock { font-size: 48px; }
    .d-team-card { padding: 22px 18px 16px; }
    .d-section { padding: 20px; }
    .d-section-title { font-size: 16px; }
  }

  /* ── TABLET LANDSCAPE / DESKTOP (840px+) ── */
  @media (min-width: 840px) {
    .display-wrap { max-width: 100%; padding: 16px 40px 40px; }
    .d-tablet-layout {
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 24px;
      align-items: start;
    }
    .d-tablet-left { position: sticky; top: 16px; display: flex; flex-direction: column; gap: 0; }
    .d-tablet-right { min-width: 0; display: flex; flex-direction: column; gap: 0; }
    .d-score { font-size: 90px; }
    .d-clock { font-size: 44px; }
    .d-feed { max-height: 400px; }
  }
</style>
</head>
<body>

<!-- CONNECT SCREEN -->
<div id="connectScreen">
  <img class="connect-logo-img" src="/logo.png" alt="AXONO" onerror="this.style.display='none';document.getElementById('connectLogoFallback').style.display='block'">
  <div id="connectLogoFallback" style="display:none;font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:8px;color:var(--dark);">AXONO</div>
  <div class="connect-live-badge">● LIVE</div>
  <div class="connect-sub">Živý přenos zápasu</div>
  <div class="connect-box">
    <div class="connect-label">Zadejte kód zápasu</div>
    <input class="connect-input" id="codeInput" placeholder="ABC-234" maxlength="7"
      onkeydown="if(event.key==='Enter') connectToMatch()" />
    <button class="connect-btn" onclick="connectToMatch()">▶ SLEDOVAT ŽIVĚ</button>
    <div class="connect-error" id="connectError"></div>
  </div>
</div>

<!-- DISPLAY SCREEN -->
<div id="displayScreen">
  <div class="display-wrap">

    <!-- Header -->
    <div class="d-header">
      <div class="d-header-logo">
        <img class="d-logo-img" src="/logo.png" alt="AXONO" onerror="this.outerHTML='<span style=\'font-family:Bebas Neue,sans-serif;font-size:20px;letter-spacing:4px;color:var(--dark)\'>AXONO</span>'">
        <div class="d-live-badge">● LIVE</div>
      </div>
      <div class="d-header-right">
        <div class="d-code" id="dCode"></div>
        <div class="d-status">
          <div class="d-sync-dot" id="dSyncDot"></div>
          <div class="d-sync-label" id="dSyncLabel">Připojuji...</div>
        </div>
      </div>
    </div>

    <!-- Clock + Scoreboard LEFT, Feed+Stats RIGHT on tablet -->
    <div class="d-tablet-layout">
    <div class="d-tablet-left">

    <!-- Clock -->
    <div class="d-clock-bar">
      <div class="d-period" id="dPeriod">TŘETINA 1</div>
      <div class="d-clock" id="dClock">20:00</div>
      <div class="d-clock-status" id="dClockStatus">STOP</div>
    </div>

    <!-- Scoreboard -->
    <div class="d-scoreboard">
      <div class="d-team-card" id="dCardA">
        <div class="d-team-color" id="dColorA" style="background:#d10020;"></div>
        <div class="d-team-name" id="dTeamA">DOMÁCÍ</div>
        <div class="d-score" id="dScoreA">0</div>
        <div class="d-pen-badges" id="dPenBadgesA"></div>
      </div>
      <div class="d-vs">
        <div class="d-vs-text">VS</div>
        <div class="d-center-line"></div>
      </div>
      <div class="d-team-card" id="dCardB">
        <div class="d-team-color" id="dColorB" style="background:#555;"></div>
        <div class="d-team-name" id="dTeamB">HOSTÉ</div>
        <div class="d-score" id="dScoreB">0</div>
        <div class="d-pen-badges" id="dPenBadgesB"></div>
      </div>
    </div>

    <!-- Active penalties -->
    <div class="d-section" id="dPenSection" style="display:none;">
      <div class="d-section-title">🚫 Aktivní tresty</div>
      <div class="d-feed" id="dActivePens"></div>
    </div>

    </div><!-- /d-tablet-left -->
    <div class="d-tablet-right">

    <!-- Goal feed -->
    <div class="d-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="d-section-title" style="margin-bottom:0;">⚡ Góly</div>
        <span id="dGoalCount" style="font-size:10px;color:var(--muted);"></span>
      </div>
      <div class="d-feed" id="dGoalFeed"><div class="empty-msg">Čekáme na první gól...</div></div>
    </div>

    <!-- Stats -->
    <div class="d-section">
      <div class="d-section-title">📊 Statistiky hráčů</div>
      <div class="d-stats" id="dStats"><div class="empty-msg">Statistiky se zobrazí po prvním gólu.</div></div>
    </div>

    </div><!-- /d-tablet-right -->
    </div><!-- /d-tablet-layout -->

  </div>
</div>

<div class="d-toast" id="dToast"></div>

<script src="/supabase.min.js"></script>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
// 👉 Stejné údaje jako v axono-sync.html — vyplňte Project URL a anon key
const SUPABASE_URL = 'https://wdwmjjbcphntymodnbub.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indkd21qamJjcGhudHltb2RuYnViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjk0NDQsImV4cCI6MjA4ODgwNTQ0NH0.5Er4or14JJZveXexxO7XCaRIhguZ3FHuLWDJbyzB0oU';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PERIODS = ['','TŘETINA 1','TŘETINA 2','TŘETINA 3','PRODLOUŽENÍ','NÁJEZDY'];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  matchId: null, code: null,
  teamA: 0, teamB: 0, period: 1,
  goals: [], penalties: [], penalties_active: [],
  clock: { seconds: 1200, running: false, interval: null, startedAt: null }
};
let realtimeChannel = null;

// ─── CONNECT ─────────────────────────────────────────────────────────────────
async function connectToMatch() {
  const raw = document.getElementById('codeInput').value.trim().toUpperCase().replace(/\s/g, '');
  let code = raw;
  if (raw.length === 6 && !raw.includes('-')) code = raw.slice(0,3)+'-'+raw.slice(3);
  const errEl = document.getElementById('connectError');
  errEl.style.display = 'none';
  if (!code) return;

  if (SUPABASE_URL.includes('VASE-ID')) {
    errEl.textContent = '⚠️ Nejsou vyplněny přístupové údaje Supabase v souboru.';
    errEl.style.display = 'block';
    return;
  }

  try {
    let data = null;
    const res1 = await sb.from('matches').select('*').eq('code', code).maybeSingle();
    if (res1.data) { data = res1.data; }
    if (!data && raw.length === 6) {
      const res2 = await sb.from('matches').select('*').ilike('code', `${raw.slice(0,3)}%${raw.slice(3)}`).maybeSingle();
      if (res2.data) { data = res2.data; code = data.code; }
    }
    if (!data) {
      errEl.textContent = `❌ Zápas "${code}" nenalezen. Zkontrolujte kód.`;
      errEl.style.display = 'block';
      return;
    }
    localStorage.setItem('axono_display_match', JSON.stringify({ matchId: data.id, code: data.code }));
    await loadAndWatch(data.id, data.code);
  } catch(e) {
    errEl.textContent = '❌ Chyba připojení: ' + e.message;
    errEl.style.display = 'block';
    console.error(e);
  }
}

async function loadAndWatch(matchId, code) {
  state.matchId = matchId;
  state.code = code;
  document.getElementById('dCode').textContent = code;

  // Load match
  const { data: match } = await sb.from('matches').select('*').eq('id', matchId).single();
  if (match) applyMatch(match);

  // Load goals
  const { data: goals } = await sb.from('goals').select('*').eq('match_id', matchId).order('created_at');
  if (goals) { state.goals = goals; renderGoals(); renderStats(); }

  // Load penalties
  const { data: pens } = await sb.from('penalties').select('*').eq('match_id', matchId).order('created_at');
  if (pens) { state.penalties = pens; renderActivePens(); }

  // Show display screen
  document.getElementById('connectScreen').style.display = 'none';
  document.getElementById('displayScreen').style.display = 'block';

  // Subscribe realtime
  subscribeRealtime(matchId);
}

// ─── APPLY MATCH STATE ────────────────────────────────────────────────────────
function applyMatch(match) {
  const prevA = state.teamA, prevB = state.teamB;
  state.teamA = match.score_a;
  state.teamB = match.score_b;
  state.period = match.period;

  document.getElementById('dTeamA').textContent = (match.team_a_name || 'DOMÁCÍ').toUpperCase();
  document.getElementById('dTeamB').textContent = (match.team_b_name || 'HOSTÉ').toUpperCase();
  document.getElementById('dPeriod').textContent = PERIODS[match.period] || 'TŘETINA 1';
  document.getElementById('dScoreA').textContent = match.score_a;
  document.getElementById('dScoreB').textContent = match.score_b;

  // Leading highlight
  document.getElementById('dCardA').classList.toggle('leading', match.score_a > match.score_b);
  document.getElementById('dCardB').classList.toggle('leading', match.score_b > match.score_a);

  // Score bump animation
  if (match.score_a > prevA) bumpScore('dScoreA');
  if (match.score_b > prevB) bumpScore('dScoreB');

  applyClockFromMatch(match);
}

function bumpScore(id) {
  const el = document.getElementById(id);
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 300);
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────
function applyClockFromMatch(match) {
  clearInterval(state.clock.interval);
  state.clock.running = false;

  if (match.clock_running && match.clock_started_at) {
    const elapsed = Math.floor((Date.now() - new Date(match.clock_started_at).getTime()) / 1000);
    state.clock.seconds = Math.max(0, match.clock_seconds - elapsed);
    state.clock.running = true;
    state.clock.interval = setInterval(() => {
      state.clock.seconds = Math.max(0, state.clock.seconds - 1);
      renderClock();
      tickPenalties();
      if (state.clock.seconds === 0) {
        clearInterval(state.clock.interval);
        state.clock.running = false;
        renderClock();
      }
    }, 1000);
  } else {
    state.clock.seconds = match.clock_seconds ?? state.clock.seconds;
  }
  renderClock();
}

function renderClock() {
  const s = state.clock.seconds;
  const str = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const el = document.getElementById('dClock');
  el.textContent = str;
  el.className = 'd-clock' + (state.clock.running ? (s < 60 ? ' warning' : ' running') : '');
  const status = document.getElementById('dClockStatus');
  status.textContent = state.clock.running ? '● LIVE' : 'STOP';
  status.className = 'd-clock-status' + (state.clock.running ? ' live' : '');
}

function tickPenalties() {
  let changed = false;
  state.penalties.forEach(p => {
    if (!p.expired && p.remaining > 0) {
      p.remaining--;
      if (p.remaining <= 0) { p.expired = true; changed = true; }
    }
  });
  if (changed) renderActivePens();
  renderPenBadges();
}

// ─── GOALS ────────────────────────────────────────────────────────────────────
function renderGoals() {
  const el = document.getElementById('dGoalFeed');
  const count = document.getElementById('dGoalCount');
  const goals = [...state.goals].reverse();
  count.textContent = `${state.goals.length} gólů`;
  if (!goals.length) { el.innerHTML = '<div class="empty-msg">Čekáme na první gól...</div>'; return; }
  el.innerHTML = goals.map(g => `
    <div class="d-event${g.team === 'B' ? ' team-b' : ''}">
      <div class="d-event-icon">🏒</div>
      <div class="d-event-info">
        <div class="d-event-name">${esc(g.scorer)}</div>
        <div class="d-event-sub">${g.assist ? 'As: ' + esc(g.assist) : ''}</div>
      </div>
      <div class="d-event-meta">${esc(g.team_name || '')}<br>T${g.period} ${g.minute}'</div>
    </div>`).join('');
}

// ─── PENALTIES ────────────────────────────────────────────────────────────────
function renderActivePens() {
  const active = state.penalties.filter(p => !p.expired);
  const section = document.getElementById('dPenSection');
  const el = document.getElementById('dActivePens');
  section.style.display = active.length ? 'block' : 'none';
  el.innerHTML = active.map(p => `
    <div class="d-pen-row">
      <div class="d-event-icon">🚫</div>
      <div class="d-event-info">
        <div class="d-event-name" style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:#fff;">${esc(p.player)}</div>
        <div class="d-event-sub">${esc(p.team_name||'')}${p.reason ? ' · ' + esc(p.reason) : ''}</div>
      </div>
      <div class="d-pen-timer">${p.remaining > 0 ? formatTime(p.remaining) : p.mins > 0 ? p.mins+"'" : '∞'}</div>
    </div>`).join('');
}

function renderPenBadges() {
  ['A','B'].forEach(t => {
    const active = state.penalties.filter(p => p.team === t && !p.expired);
    const el = document.getElementById('dPenBadges'+t);
    el.innerHTML = active.map(p =>
      `<span class="d-pen-badge">${p.mins > 0 ? formatTime(p.remaining) : '∞'}</span>`
    ).join('');
  });
}

function formatTime(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const el = document.getElementById('dStats');
  const map = {};
  state.goals.forEach(g => {
    if (g.scorer) {
      if (!map[g.scorer]) map[g.scorer] = { name: g.scorer, team: g.team_name, goals:0, assists:0, pens:0 };
      map[g.scorer].goals++;
    }
    if (g.assist) {
      if (!map[g.assist]) map[g.assist] = { name: g.assist, team: g.team_name, goals:0, assists:0, pens:0 };
      map[g.assist].assists++;
    }
  });
  state.penalties.forEach(p => {
    if (p.player) {
      if (!map[p.player]) map[p.player] = { name: p.player, team: p.team_name, goals:0, assists:0, pens:0 };
      map[p.player].pens++;
    }
  });
  const sorted = Object.values(map).sort((a,b) => (b.goals+b.assists) - (a.goals+a.assists));
  if (!sorted.length) { el.innerHTML = '<div class="empty-msg">Statistiky se zobrazí po prvním gólu.</div>'; return; }
  el.innerHTML = sorted.map(p => `
    <div class="d-stat-row">
      <div>
        <span class="d-stat-name">${esc(p.name)}</span>
        <span class="d-stat-team">${esc(p.team||'')}</span>
      </div>
      <div class="d-stat-nums">
        <div class="d-stat-num"><div class="val">${p.goals}</div><div class="lbl">G</div></div>
        <div class="d-stat-num"><div class="val">${p.assists}</div><div class="lbl">A</div></div>
        <div class="d-stat-num"><div class="val">${p.goals+p.assists}</div><div class="lbl">Pts</div></div>
        <div class="d-stat-num"><div class="val" style="color:var(--warn)">${p.pens}</div><div class="lbl">TM</div></div>
      </div>
    </div>`).join('');
}

// ─── REALTIME ─────────────────────────────────────────────────────────────────
function subscribeRealtime(matchId) {
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb.channel(`display-${matchId}`)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'matches', filter: `id=eq.${matchId}` }, (payload) => {
      const data = payload.new;
      if (!data) return;
      const prevA = state.teamA, prevB = state.teamB;
      if (data.score_a > prevA || data.score_b > prevB) {
        const teamName = data.score_a > prevA
          ? (data.team_a_name || 'Domácí')
          : (data.team_b_name || 'Hosté');
        showToast(`⚡ GÓL — ${teamName}!`, true);
      }
      applyMatch(data);
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'goals', filter: `match_id=eq.${matchId}` }, async () => {
      const { data } = await sb.from('goals').select('*').eq('match_id', matchId).order('created_at');
      if (data) { state.goals = data; renderGoals(); renderStats(); }
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'penalties', filter: `match_id=eq.${matchId}` }, async () => {
      const { data } = await sb.from('penalties').select('*').eq('match_id', matchId).order('created_at');
      if (data) { state.penalties = data; renderActivePens(); renderPenBadges(); }
    })
    .subscribe(status => {
      const dot = document.getElementById('dSyncDot');
      const label = document.getElementById('dSyncLabel');
      const ok = status === 'SUBSCRIBED';
      dot.style.background = ok ? '#00e676' : '#e8001c';
      label.textContent = ok ? 'Připojeno' : 'Odpojeno';
    });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg, isGoal = false) {
  const t = document.getElementById('dToast');
  t.textContent = msg;
  t.className = 'd-toast' + (isGoal ? ' goal' : '') + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Zkusit obnovit poslední sledovaný zápas
(async () => {
  try {
    // Kód může být v URL parametru: axono-display.html?kod=ABC-234
    const urlCode = new URLSearchParams(window.location.search).get('kod');
    if (urlCode) {
      document.getElementById('codeInput').value = urlCode;
      await connectToMatch();
      return;
    }
    const saved = localStorage.getItem('axono_display_match');
    if (saved) {
      const { matchId, code } = JSON.parse(saved);
      if (matchId && code) {
        document.getElementById('codeInput').value = code;
        await loadAndWatch(matchId, code);
      }
    }
  } catch(e) { console.warn('Auto-restore failed:', e); }
})();
</script>
